<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Le gustó nuestra pagina?⭐️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:300px}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#e4c170,#b6756f);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  transition:background 1.2s ease;
}

.card{
  background:#e7cf7f;
  padding:50px;
  border-radius:50px;
  width:90%;
  max-width:390px;
  text-align:center;
  box-shadow:0 30px 60px rgba(211, 90, 68, 0.884);
  z-index:5;
  animation:pop .9s ease;
}

@keyframes pop{
  from{transform:scale(.9);opacity:0}
  to{transform:scale(1);opacity:1}
}

h1{
  color:#943232;
  margin-bottom:12px;
  font-family: "cursive",;
}

p{
  color:#6d4c5c;
  font-size:16px;
  margin-bottom:18px;
}

.buttons{
  position:relative;
  height:160px;
}

button{
  border:none;
  padding:15px 30px;
  border-radius:45px;
  font-size:16px;
  cursor:pointer;
  position:absolute;
  transition:all .4s ease;
}


.yes{
  background:linear-gradient(135deg,#02446e,#8fa7f4);
  color:#fff;
  left:45%;
  top:40px;
  box-shadow:0 14px 30px rgba(236,64,122,.45);
}


.no{
  background:#c16060;
  color:#d6c69f;
  left:15%;
  top:100px;
}


.pulse{
  animation:pulse 1.8s infinite;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}


.spark{
  position:absolute;
  font-size:18px;
  animation:spark 1.1s ease-out forwards;
  pointer-events:none;
}
@keyframes spark{
  from{opacity:1;transform:translate(0,0) scale(1)}
  to{opacity:0;transform:translate(var(--x),var(--y)) scale(1.4)}
}
</style>
</head>

<body>

<div class="card" id="card">
  <h1>¿Le gustó nuestra pagina profe?🪼</h1>
  <p id="text">Su opinión es importante para nosotros💫</p>
  <p><strong>Conteste aquiiii⚡️<strong></p>

  <div class="buttons">
    <button class="yes pulse" id="yesBtn">Sí ✨</button>
    <button class="no" id="noBtn">No 😠</button>
  </div>
</div>


<audio id="musica">
  <source src="music/victoria.m4a" type="audio/m4a">
</audio>

<script>
const phrases=[
  "¿Seguro? 🥺",
  "Nos salio bonito",
  "Tambien nos tardamos mucho✨",
  "Trabajamos en equipo",
  "Entonces nos va a decir que si...?🥺",
  "Ok… le regalaremos un chocolate ✨🍫"
];

let count=0;
let yesScale=1;
let noScale=1;

const yes=document.getElementById("yesBtn");
const no=document.getElementById("noBtn");
const text=document.getElementById("text");

no.onclick=()=>{
  text.innerText=phrases[count%phrases.length];
  count++;

  yesScale+=0.08;
  yes.style.transform=`scale(${yesScale})`;

  noScale-=0.08;
  if(noScale<0.45) noScale=0.45;
  no.style.transform=`scale(${noScale})`;

  yes.style.filter="brightness(0.95)";
  no.style.filter="brightness(0.85)";

  yes.style.left=46+Math.random()*8+"%";
  no.style.left=Math.random()*30+"%";
  no.style.top=90+Math.random()*40+"px";
};

yes.onclick=()=>{

  const musica = document.getElementById("musica");
  musica.play();

  document.body.style.background="linear-gradient(135deg,#ffffff,#fbc8d4)";

  document.getElementById("card").innerHTML=`
    <h1>🌟</h1>
    <p>.</p>
    <p><strong>Que bueno que le gustó nuestra pagina profesor Alfonso✨</strong></p>
    <p style="font-size:14px;color:#a77;">
      (Estamos muy felices de que le guste)
    </p>
  `;
};
  document.body.style.background="linear-gradient(135deg,#fffff,#fbc8d4)";
  document.getElementById("card").innerHTML=`
    <h1>🌟</h1>
    <p>.</p>
    <p><strong>Que bueno que le gustó nuestra pagina profesor Alfonso✨</strong></p>
    <p style="font-size:14px;color:#a77;">(Estamos muy felices de que le guste)</p>
  `;



};


document.body.addEventListener("click",e=>{
  for(let i=0;i<12;i++){
    const s=document.createElement("span");
    s.className="spark";
    s.innerHTML="✨🌟";
    s.style.left=e.clientX+"px";
    s.style.top=e.clientY+"px";
    s.style.setProperty("--x",(Math.random()*180-90)+"px");
    s.style.setProperty("--y",(Math.random()*180-90)+"px");
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1100);
  }
});
</script>

</body>
</html>
